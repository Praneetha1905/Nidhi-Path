<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation Admin | Nidhi Path Loan Ventures</title>
  <link rel="stylesheet" href="style.css?v=016">
</head>
<body class="admin-page" data-admin-page="navigationAdmin">
  <header class="admin-topbar">
    <a href="admin-dashboard.html" class="header-home-link brand-name"><img class="site-logo" src="logo.jpg" alt="Nidhi Path Loan Ventures logo"><span class="brand-text">Nidhi Path</span></a>
    <nav class="admin-nav" aria-label="Admin navigation"></nav>
    <button type="button" class="header-login-link" data-admin-logout>Logout</button>
  </header>
  <main class="admin-main">
    <section class="admin-heading">
      <p class="eyebrow">Website Control</p>
      <h1>Navigation</h1>
      <p>Manage future navigation records. Current public headers remain static until dynamic rendering is enabled.</p>
    </section>
    <p class="form-status" id="admin-page-status" aria-live="polite"></p>
    <section class="admin-grid-two">
      <form class="admin-panel admin-editor-stack" id="admin-navigation-form">
        <h2>Add or edit nav item</h2>
        <input type="hidden" id="navigation-id">
        <label>Label<input name="label" type="text" required></label>
        <label>Href<input name="href" type="text" required></label>
        <label>Group<input name="navGroup" type="text" value="main"></label>
        <label>Display order<input name="displayOrder" type="number" value="0"></label>
        <label class="checkbox-field"><input name="isVisible" type="checkbox" checked><span>Visible</span></label>
        <div class="admin-actions">
          <button type="submit" class="btn">Save Navigation</button>
          <button type="button" class="btn secondary-btn" id="navigation-form-reset">Clear</button>
        </div>
      </form>
      <div class="admin-panel">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr><th>Label</th><th>Href</th><th>Group</th><th>Order</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="admin-navigation-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
  <script src="admin.js?v=016"></script>
</body>
</html>
