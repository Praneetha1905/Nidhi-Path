<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services Admin | Nidhi Path Loan Ventures</title>
  <link rel="stylesheet" href="style.css?v=016">
</head>
<body class="admin-page" data-admin-page="servicesAdmin">
  <header class="admin-topbar">
    <a href="admin-dashboard.html" class="header-home-link brand-name"><img class="site-logo" src="logo.jpg" alt="Nidhi Path Loan Ventures logo"><span class="brand-text">Nidhi Path</span></a>
    <nav class="admin-nav" aria-label="Admin navigation"></nav>
    <button type="button" class="header-login-link" data-admin-logout>Logout</button>
  </header>
  <main class="admin-main">
    <section class="admin-heading">
      <p class="eyebrow">Website Control</p>
      <h1>Services</h1>
      <p>Manage service catalog records without changing the current static service pages.</p>
    </section>
    <p class="form-status" id="admin-page-status" aria-live="polite"></p>
    <section class="admin-grid-two">
      <form class="admin-panel admin-editor-stack" id="admin-service-form">
        <h2>Add or edit service</h2>
        <input type="hidden" id="service-id">
        <label>Service name<input name="serviceName" type="text" required></label>
        <label>Service key<input name="serviceKey" type="text" required></label>
        <label>Short description<textarea name="shortDescription" rows="2"></textarea></label>
        <label>Long description<textarea name="longDescription" rows="4"></textarea></label>
        <label>Icon<input name="icon" type="text"></label>
        <label>Page URL<input name="pageUrl" type="text"></label>
        <label>Display order<input name="displayOrder" type="number" value="0"></label>
        <label class="checkbox-field"><input name="isActive" type="checkbox" checked><span>Active</span></label>
        <div class="admin-actions">
          <button type="submit" class="btn">Save Service</button>
          <button type="button" class="btn secondary-btn" id="service-form-reset">Clear</button>
        </div>
      </form>
      <div class="admin-panel">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr><th>Name</th><th>Key</th><th>Page</th><th>Order</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="admin-services-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
  <script src="admin.js?v=016"></script>
</body>
</html>
