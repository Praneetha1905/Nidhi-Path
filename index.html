<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nidhi Path SmartCRM Intelligence</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body class="login-body">
  <div style="text-align:center;max-width:520px;position:relative;z-index:1">
    <img src="/assets/img/logo.jpg" alt="Nidhi Path" style="width:80px;height:80px;border-radius:18px;margin:0 auto 20px" onerror="this.style.display='none'">
    <div style="color:var(--gold);font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:8px">Nidhi Path SmartCRM Intelligence</div>
    <h1 style="font-family:var(--font-head);color:#fff;font-size:34px;font-weight:800;margin-bottom:14px">Way to Money</h1>
    <p style="color:rgba(255,255,255,.6);font-size:14px;margin-bottom:30px;line-height:1.7">Education loan consultancy CRM — manage leads, clients, employees, commissions and reports from one premium platform.</p>
    <a href="/login.html" class="btn btn-primary" style="padding:13px 32px;font-size:15px">Login to Portal →</a>
  </div>
  <script>
    const t = sessionStorage.getItem('np_token'), r = sessionStorage.getItem('np_role');
    if (t && r) {
      const map = { admin:'/admin/dashboard.html', employee:'/employee/dashboard.html', board_member:'/board/dashboard.html', client:'/client/dashboard.html', student:'/student/dashboard.html' };
      if (map[r]) window.location.href = map[r];
    }
  </script>
</body>
</html>
