<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Chats | Nidhi Path Loan Ventures</title>
  <link rel="stylesheet" href="style.css?v=016">
</head>
<body class="admin-page" data-admin-page="chats">
  <header class="admin-topbar">
    <a href="admin-dashboard.html" class="header-home-link brand-name"><img class="site-logo" src="logo.jpg" alt="Nidhi Path Loan Ventures logo"><span class="brand-text">Nidhi Path</span></a>
    <nav class="admin-nav" aria-label="Admin navigation"></nav>
    <button type="button" class="header-login-link" data-admin-logout>Logout</button>
  </header>
  <main class="admin-main">
    <section class="admin-heading">
      <p class="eyebrow">Live Agent Desk</p>
      <h1>Chats</h1>
      <p>Open customer chat requests and continue the conversation inside the admin workspace.</p>
    </section>
    <p class="form-status" id="admin-page-status" aria-live="polite"></p>
    <form class="admin-panel admin-filter-bar" id="admin-chat-filters">
      <input type="search" id="chat-search" placeholder="Search customer, phone, email, service or chat ID">
      <select id="chat-status-filter" aria-label="Filter by status"></select>
      <button type="submit" class="btn">Apply</button>
      <button type="button" class="btn secondary-btn" id="chat-filter-reset">Reset</button>
    </form>
    <div class="admin-panel">
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr><th>Chat ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Service</th><th>Status</th><th>Last message</th><th>Category / bot</th><th>Action</th></tr>
          </thead>
          <tbody id="admin-chats-body"></tbody>
        </table>
      </div>
      <p class="admin-table-note" id="admin-chats-pagination"></p>
    </div>
  </main>
  <script src="script.js"></script>
  <script src="admin.js?v=016"></script>
</body>
</html>
