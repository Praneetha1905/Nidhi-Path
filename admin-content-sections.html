<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Sections | Nidhi Path Loan Ventures</title>
  <link rel="stylesheet" href="style.css?v=016">
</head>
<body class="admin-page" data-admin-page="contentSections">
  <header class="admin-topbar">
    <a href="admin-dashboard.html" class="header-home-link brand-name"><img class="site-logo" src="logo.jpg" alt="Nidhi Path Loan Ventures logo"><span class="brand-text">Nidhi Path</span></a>
    <nav class="admin-nav" aria-label="Admin navigation"></nav>
    <button type="button" class="header-login-link" data-admin-logout>Logout</button>
  </header>
  <main class="admin-main">
    <section class="admin-heading">
      <p class="eyebrow">Website Control</p>
      <h1>Content Sections</h1>
      <p>Edit section records for future dynamic website rendering.</p>
    </section>
    <p class="form-status" id="admin-page-status" aria-live="polite"></p>
    <section class="admin-grid-two">
      <form class="admin-panel admin-editor-stack" id="admin-section-form">
        <h2>Edit selected section</h2>
        <input type="hidden" id="section-id">
        <label>Title<input name="sectionTitle" type="text"></label>
        <label>Subtitle<input name="sectionSubtitle" type="text"></label>
        <label>Display order<input name="displayOrder" type="number" value="0"></label>
        <label class="checkbox-field"><input name="isVisible" type="checkbox" checked><span>Visible</span></label>
        <label>Section content JSON<textarea id="section-content-json" rows="8">{}</textarea></label>
        <button type="submit" class="btn">Save Section</button>
      </form>
      <div class="admin-panel">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr><th>Section</th><th>Title</th><th>Order</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="admin-sections-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
  <script src="admin.js?v=016"></script>
</body>
</html>
