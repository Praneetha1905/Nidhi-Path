<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Nidhi Path Loan Ventures</title>
  <link rel="stylesheet" href="style.css?v=016">
</head>
<body class="login-page admin-page" data-admin-page="login" data-login-default="admin">
  <header>
    <div class="header-left">
      <a href="index.html" class="header-home-link brand-name"><img class="site-logo" src="logo.jpg" alt="Nidhi Path Loan Ventures logo"><span class="brand-text">Nidhi Path</span></a>
      <a href="admin-login.html" class="header-login-link is-active" aria-current="page" data-i18n="admin-login">Admin Login</a>
      <label class="translate-chip" for="language-select">
        <span data-i18n="translate-label">Translate</span>
        <select id="language-select" class="language-select">
          <option value="en">English</option>
          <option value="hi">&#2361;&#2367;&#2344;&#2381;&#2342;&#2368;</option>
          <option value="te">&#3108;&#3142;&#3122;&#3137;&#3095;&#3137;</option>
        </select>
      </label>
    </div>
    <div class="header-right">
      <button class="hamburger" aria-label="Menu">&#9776;</button>
      <nav>
        <a href="index.html" data-i18n="home-nav">Home</a>
        <a href="contact.html" data-i18n="contact-us-nav">Contact Us</a>
      </nav>
    </div>
  </header>

  <main class="login-main">
    <section class="login-shell">
      <div class="login-panel">
        <form id="login-form" class="login-form" novalidate>
          <img class="login-panel-logo" src="logo.jpg" alt="Nidhi Path Loan Ventures logo">
          <div class="form-intro">
            <p class="eyebrow">Secure Access</p>
            <h1 id="login-form-title" data-no-translate>Admin Login</h1>
            <p id="login-form-copy" data-no-translate>For authorized Nidhi Path team members only.</p>
          </div>
          <input type="hidden" id="login-mode" value="admin">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" autocomplete="username" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="login-password" data-i18n="login-password">Password</label>
            <div class="password-field">
              <input type="password" id="login-password" autocomplete="current-password" data-placeholder-i18n="login-password-placeholder" required minlength="6">
              <button type="button" class="password-toggle" id="password-toggle"></button>
            </div>
          </div>
          <button type="submit" class="btn btn-block" data-i18n-btn="sign-in">Sign In</button>
          <p class="login-status" id="login-status" aria-live="polite"></p>
          <p class="login-note" id="login-note" data-no-translate>Admin access is restricted to authorized team members.</p>
        </form>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
