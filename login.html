<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Nidhi Path SmartCRM</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body class="login-body">
  <div class="login-wrap">
    <div class="login-header">
      <img src="/assets/img/logo.jpg" alt="Nidhi Path" onerror="this.style.display='none'">
      <h1>NIDHI PATH</h1>
      <div class="tagline">SmartCRM Intelligence</div>
      <p>Choose your portal to sign in</p>
    </div>

    <div class="login-cards">

      <!-- Student -->
      <div class="login-card">
        <div class="login-card-ico lc-student">🎓</div>
        <h2>Student Login</h2>
        <p class="lc-sub">Track your education loan application status and updates.</p>
        <form data-login-form="student">
          <div class="login-error" data-login-error></div>
          <div class="field">
            <label>Email</label>
            <input class="input" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
          </div>
          <div class="field">
            <label>Password</label>
            <input class="input" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-green btn-block">Sign In</button>
        </form>
      </div>

      <!-- Client -->
      <div class="login-card">
        <div class="login-card-ico lc-client">🤝</div>
        <h2>Client Login</h2>
        <p class="lc-sub">View your referrals, lead progress and commission status.</p>
        <form data-login-form="client">
          <div class="login-error" data-login-error></div>
          <div class="field">
            <label>Email</label>
            <input class="input" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
          </div>
          <div class="field">
            <label>Password</label>
            <input class="input" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>
      </div>

      <!-- Employee / Admin / Board -->
      <div class="login-card">
        <div class="login-card-ico lc-employee">💼</div>
        <h2>Employee Login</h2>
        <p class="lc-sub">For Employees, Admins and Board Members.</p>
        <form data-login-form="employee">
          <div class="login-error" data-login-error></div>
          <div class="field">
            <label>Email</label>
            <input class="input" name="email" type="email" autocomplete="email" placeholder="you@nidhipath.in" required>
          </div>
          <div class="field">
            <label>Password</label>
            <input class="input" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-navy btn-block">Sign In</button>
        </form>
      </div>

    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => window.Auth.initLogin());</script>
</body>
</html>
